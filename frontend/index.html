<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Master — Financial Simulation Game</title>
    <meta name="description" content="A multiplayer financial simulation game. Manage ₹1,00,000 monthly income, invest smartly, and survive 12 months of challenges.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .login-card {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .login-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
        }
        .feature-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature-chip {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-full);
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .feature-chip i { font-size: 0.7rem; }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: white;
            color: #1f2937;
            font-weight: 600;
            padding: 0.875rem 2.5rem;
            border-radius: var(--radius-full);
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
            font-family: var(--font-primary);
        }
        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.2);
        }
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle linear infinite;
        }
        @keyframes float-particle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card glass-card animate-fade-in-up">
            <div class="login-icon animate-float">
                <i class="fa-solid fa-coins" style="color: white;"></i>
            </div>

            <h1 class="display-hero g-text" style="margin-bottom: 0.5rem;">Money Master</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0.5rem;">
                Financial Simulation Game
            </p>
            <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; max-width: 380px; margin-left: auto; margin-right: auto;">
                Manage your ₹1,00,000 monthly income. Invest wisely, survive emergencies, and become the ultimate financial strategist over 12 months.
            </p>

            <button id="loginBtn" onclick="loginWithGoogle()" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <div id="loader" style="display: none; margin-top: 1.5rem;">
                <div class="spinner-glass" style="margin: 0 auto;"></div>
            </div>

            <div class="feature-row">
                <div class="feature-chip"><i class="fa-solid fa-chart-line text-emerald"></i> Invest</div>
                <div class="feature-chip"><i class="fa-solid fa-bolt text-amber"></i> Events</div>
                <div class="feature-chip"><i class="fa-solid fa-trophy text-amber"></i> Compete</div>
                <div class="feature-chip"><i class="fa-solid fa-shield-halved text-cyan"></i> Strategy</div>
            </div>
        </div>

        <p style="color: var(--text-muted); font-size: 0.75rem; margin-top: 2rem;">
            Built for financial literacy • Zero real money involved
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        // Create floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.width = (1 + Math.random() * 2) + 'px';
            p.style.height = p.style.width;
            container.appendChild(p);
        }
    </script>
</body>
</html>
